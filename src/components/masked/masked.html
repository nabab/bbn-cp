<span :class="[componentClass, 'bbn-textbox', {
        'bbn-disabled': !!isDisabled,
        'bbn-flex-width bbn-vmiddle': !!pref?.length
      }]"
      tabindex="-1">
  <span bbn-if="pref?.length"
        class="bbn-masked-pref bbn-nowrap bbn-vmiddle bbn-left-xspadding"
        bbn-text="pref"/>
  <input ref="element"
         :disabled="isDisabled"
         :required="required"
         :readonly="readonly"
         :placeholder="placeholder"
         :tabindex="currentTabIndex"
         @click="onClick"
         @focus="focusEvent"
         @blur="blurEvent"
         @change="onChange"
         @keydown="keydownEvent"
         @keyup="keyupEvent"
         @mouseenter="over"
         @mouseleave="out"
         @input.stop="inputEvent"
         @paste="pasteEvent"
         @cut="cutEvent"
         :size="currentInputSize"
         :class="['bbn-radius', {'bbn-flex-fill': !!pref?.length}]"
         :inputmode="$el.inputmode"
         :pattern="pattern">
  <input :value="value"
         ref="real_masked"
         :name="name"
         :disabled="isDisabled"
         type="hidden"
         :size="size"
         :maxlength="maxlength">
</span>
