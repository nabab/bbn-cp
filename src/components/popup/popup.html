<div :class="['bbn-overlay', componentClass]"
     bbn-show="showPopup"
     :style="{zIndex: maxZindex > zIndex ? maxZindex - 1 : zIndex}">
  <div bbn-for="(popup, i) in popups"
       bbn-if="popup.modal !== false"
       class="bbn-modal bbn-overlay"
       :style="{zIndex: popup.zIndex || (zIndex + i)}"
       @keydown.esc.prevent.stop="close(i)"
       @click="close(i)"/>
  <bbn-floater bbn-for="(popup, i) in popups"
               :key="popup.uid"
               :ref="popup.uid"
               :index="popup.index"
               bbn-bind="popup"
               :container="$el"
               :z-index="popup.zIndex || (zIndex + i)"
               @close="onClose(i)"/>
</div>
