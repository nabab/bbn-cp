<div :class="[componentClass, 'bbn-reset', {'bbn-100': scrollable}]"
     tabindex="-1">
  <div ref="element"
      :tabindex="currentTabIndex"
      class="bbn-100"
      @keydown="onKeyDown"/>
  <bbn-scrollbar orientation="vertical"
                 bbn-if="scrollable && scrollContainer"
                 :container="scrollContainer"/>
</div>
