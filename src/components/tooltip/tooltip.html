<component :is="tag"
           :class="componentClass"
           @mouseenter="currentVisible = true"
           @click="toggle()">
  <bbn-floater bbn-if="currentVisible"
               :tag="tag"
               ref="floater"
               tabindex="-1"
               :position="position"
               :content="getContent()"
               @close="onFloaterClose"
               :component="component"
               bbn-portal="$root"
               :element="element || $el"
               :element-width="false"
               :arrow="true"
               :distance="distance"
               :auto-hide="500"
               :scrollable="false"/>
  <slot></slot>
  <span class="bbn-p bbn-tooltip-icon bbn-left-xsspace"
        ref="helper"
        bbn-if="icon">
    <i :class="[icon, 'bbn-m']"/>
  </span>
</component>
